# ═══════════════════════════════════════════════════════════════════════════════
# DriveLegal — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# Install:
#   sudo cp nginx-drivelegal.conf /etc/nginx/sites-available/drivelegal
#   sudo ln -s /etc/nginx/sites-available/drivelegal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ═══════════════════════════════════════════════════════════════════════════════

# Rate limiting zone (30 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream backend
upstream drivelegal_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect (uncomment after certbot)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN_HERE;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment after certbot
    server_name _;  # Replace with your domain

    # SSL (managed by certbot — uncomment after running certbot)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Request size limit (for image uploads — base64 images can be large)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Main API proxy
    location / {
        proxy_pass http://drivelegal_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS headers (allow Netlify frontend + mobile apps)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Timeouts (AI model inference can take 30-60 seconds)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Rate limiting
        limit_req zone=api burst=50 nodelay;
    }

    # Health check endpoint (no rate limit, for monitoring)
    location /health {
        proxy_pass http://drivelegal_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API docs
    location /docs {
        proxy_pass http://drivelegal_backend/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://drivelegal_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
}
